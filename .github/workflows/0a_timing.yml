name: 0A. Update Workflow Timings

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write  # 🔥 Yahan 'read' ki jagah 'write' karein

jobs:
  update-timings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # persist-credentials: true (Yeh default hota hai)

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run timing.py
        run: python update_timing.py

      - name: Commit and push changes
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          
          # Check changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update workflow cron times [skip ci]"
          
          # GITHUB_TOKEN automatic use hoga
          git pull --rebase --no-edit
          git push