name: 5A. Withdraw Connection

on:
  workflow_dispatch:
  schedule:
    - cron: '13 9 * * *'
    - cron: '1 19 * * *'
    - cron: '28 15 * * *'
    - cron: '17 22 * * *'
    - cron: '12 3 * * *'
    - cron: '37 16 * * *'
    - cron: '17 18 * * *'
    - cron: '48 12 * * *'
    - cron: '8 16 * * *'
    - cron: '36 22 * * *'
    - cron: '6 22 * * *'
    - cron: '31 3 * * *'
    - cron: '30 7 * * *'
    - cron: '10 11 * * *'
    - cron: '2 20 * * *'
    - cron: '6 20 * * *'
    - cron: '38 22 * * *'
    - cron: '53 17 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth cryptography python-dotenv
          playwright install chromium --with-deps

      - name: Install and Start Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          sudo systemctl start warp-svc
          sleep 3
          export WARP_ACCEPT_TOS=1
          warp-cli --accept-tos registration new || warp-cli registration new
          warp-cli --accept-tos mode proxy || warp-cli mode proxy
          warp-cli --accept-tos connect || warp-cli connect
          sleep 5

      - name: Execute Automation Script
        env:
          DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
          HTTP_PROXY: http://127.0.0.1:40000
          HTTPS_PROXY: http://127.0.0.1:40000
        run: |
          python withdraw_connection.py

      - name: Commit and Push updated connections state
        if: success()
        run: |
          git add scraped_connections.json
          git diff-index --quiet HEAD || git commit -m "Automated: Update withdrawn connection status [skip ci]"
          git pull origin ${GITHUB_REF_NAME} --rebase
          git push origin ${GITHUB_REF_NAME}